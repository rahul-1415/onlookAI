version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onlook
      POSTGRES_USER: onlook
      POSTGRES_PASSWORD: onlook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://onlook:onlook@postgres:5432/onlook
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_ROOT: /workspace/.storage
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace

volumes:
  postgres-data:
  redis-data:

